{% extends 'base.html' %}

{% block content %}
<div class="containter">
    <h2>Видалення завдання</h2>
    <p>Ви впевненні, що хочете видалити завдання {{ object.title }}</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-danger">Так, видалити</button>
        <a href="{% url 'tasks:task-list' %}" class="btn btn-secondary">Ні, повернутися до списку</a>
    </form>
</div>
{% endblock %}
